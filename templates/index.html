<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GPFA Image Upload</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background: #f4f6f8;
            margin: 0;
            padding: 40px;
        }

        .container {
            max-width: 700px;
            margin: 0 auto;
            background: white;
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 4px 14px rgba(0,0,0,0.1);
        }

        h1 {
            margin-top: 0;
            color: #222;
        }

        p {
            color: #555;
        }

        .flash {
            background: #ffe0e0;
            color: #900;
            padding: 12px;
            border-radius: 8px;
            margin-bottom: 20px;
        }

        input[type="file"] {
            margin: 20px 0;
        }

        button {
            background: #007bff;
            color: white;
            border: none;
            padding: 12px 18px;
            border-radius: 8px;
            cursor: pointer;
            font-size: 16px;
        }

        button:hover {
            background: #005ecb;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>Collage Image Upload</h1>
        <p>Upload between 3 and 10 images to begin processing.</p>

        {% with messages = get_flashed_messages() %}
            {% if messages %}
                {% for message in messages %}
                    <div class="flash">{{ message }}</div>
                {% endfor %}
            {% endif %}
        {% endwith %}

        <form action="{{ url_for('upload_images') }}" method="POST" enctype="multipart/form-data">
            <input type="file" name="images" accept="image/*" multiple required>
            <br>
            <button type="submit">Upload Images</button>
        </form>
    </div>
</body>
</html>
