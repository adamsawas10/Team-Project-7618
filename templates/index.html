<!DOCTYPE html>
<html>
<head>
    <title>Interactive Collage Generator</title>
    <style>
        body {
            margin: 0;
            font-family: Arial, sans-serif;
            background: linear-gradient(135deg, #141e30, #243b55);
            color: white;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .card {
            background: rgba(255, 255, 255, 0.12);
            padding: 40px;
            border-radius: 18px;
            width: 420px;
            text-align: center;
            box-shadow: 0 20px 50px rgba(0,0,0,0.3);
        }

        h1 {
            margin-bottom: 10px;
        }

        p {
            color: #ddd;
        }

        input {
            margin: 25px 0;
        }

        button {
            background: #00c6ff;
            border: none;
            padding: 12px 20px;
            border-radius: 999px;
            color: white;
            font-size: 16px;
            cursor: pointer;
        }

        button:hover {
            background: #0072ff;
        }

        .flash {
            background: #ffdddd;
            color: #8b0000;
            padding: 10px;
            border-radius: 8px;
            margin-bottom: 15px;
        }

        #preview {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 8px;
            margin-top: 20px;
        }

        #preview img {
            width: 100%;
            height: 80px;
            object-fit: cover;
            border-radius: 8px;
        }
    </style>
</head>
<body>
    <div class="card">
        <h1>Interactive Collage Generator</h1>
        <p>Upload 3 to 10 images to create your collage.</p>

        {% with messages = get_flashed_messages() %}
            {% if messages %}
                {% for message in messages %}
                    <div class="flash">{{ message }}</div>
                {% endfor %}
            {% endif %}
        {% endwith %}

        <form action="{{ url_for('upload_images') }}" method="POST" enctype="multipart/form-data">
    <input type="file" name="images" id="images" accept="image/*" multiple required>
    
    <br>

    <label for="filter">Choose a filter:</label>
    <br>
    <select name="filter" id="filter">
        <option value="grayscale">Grayscale</option>
        <option value="negative">Negative</option>
        <option value="sepia">Sepia</option>
        <option value="saturation">Saturation</option>
    </select>

    <br><br>

    <button type="submit">Generate Collage</button>
</form>

        <div id="preview"></div>
    </div>

    <script>
        const input = document.getElementById("images");
        const preview = document.getElementById("preview");

        input.addEventListener("change", () => {
            preview.innerHTML = "";

            Array.from(input.files).forEach(file => {
                const img = document.createElement("img");
                img.src = URL.createObjectURL(file);
                preview.appendChild(img);
            });
        });
    </script>
</body>
</html>
