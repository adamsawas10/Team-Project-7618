<!DOCTYPE html>
<html>
<head>
    <title>Results</title>
    <style>
        body {
            margin: 0;
            font-family: Arial, sans-serif;
            background: linear-gradient(135deg, #141e30, #243b55);
            color: white;
            min-height: 100vh;
            display: center;
            justify-content: center;
            align-items: center;
        }

        #return {
            background: #00c6ff;
            border: none;
            padding: 12px 20px;
            border-radius: 999px;
            color: white;
            font-size: 16px;
            cursor: pointer;
        }

        button:hover {
            background: #0072ff;
        }

        .container {
            display: flex;
            gap: 10px; 
            }
        #color1 {
            width: 40px;
            height: 40px;
            background-color: {{c1}};
        }

        #color2 {
            width: 40px;
            height: 40px;
            background-color: {{c2}};
        }

        #color3 {
            width: 40px;
            height: 40px;
            background-color: {{c3}};
        }

        #color4 {
            width: 40px;
            height: 40px;
            background-color: {{c4}};
        }

        #color5 {
            width: 40px;
            height: 40px;
            background-color: {{c5}};
            
        }
    
        #pallete
        {
            margin-bottom: 20px;
        }

    </style>
</head>
<body>
    <h1>Your Uploaded Images</h1>
    <img src="{{ collage_image }}" width="700">
    <br><br>
    <a href="{{ url_for('index') }}" id="return">Upload more images</a>
    <div class="container">
    <h1 id= "pallete">Color pallete: </h1>
    <div id="color1"> </div>
    <div id="color2"> </div>
    <div id="color3"> </div>
    <div id="color4"> </div>
    <div id="color5"> </div>
    </div>
</body>
</html>
