<!DOCTYPE html>
<html>
<head>
    <title>Your Collage</title>
    <style>
        body {
            margin: 0;
            font-family: Arial, sans-serif;
            background: #111;
            color: white;
            text-align: center;
            padding: 30px;
        }

        h1 {
            margin-bottom: 10px;
        }

        .collage {
            max-width: 900px;
            margin: 30px auto;
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 8px;
        }

        .collage img {
            width: 100%;
            height: 220px;
            object-fit: cover;
            border-radius: 12px;
            transition: transform 0.2s, filter 0.2s;
        }

        .collage img:hover {
            transform: scale(1.04);
            filter: contrast(140%) saturate(160%);
        }

        a {
            color: #00c6ff;
            text-decoration: none;
        }
    </style>
</head>
<body>
    <h1>Your Collage</h1>
    <p>Hover over the images to interact with them.</p>

    <div class="collage">
        {% for image in images %}
            <img src="{{ image }}">
        {% endfor %}
    </div>

    <a href="{{ url_for('index') }}">Upload new images</a>
</body>
</html>
