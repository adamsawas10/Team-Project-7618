<!DOCTYPE html>
<html>
<head>
    <title>Results</title>

    <style>
        body {
            margin: 0;
            font-family: Arial, sans-serif;
            background: linear-gradient(135deg, #141e30, #243b55);
            color: white;
            min-height: 100vh;

            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;

            padding: 20px;
        }

        #return {
            background: #00c6ff;
            border: none;
            padding: 12px 20px;
            border-radius: 999px;
            color: white;
            font-size: 16px;
            text-decoration: none;
            cursor: pointer;
            margin-top: 20px;
        }

        #return:hover {
            background: #0072ff;
        }

        .container {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-top: 20px;
        }

        #palette {
            margin: 0;
        }

        .color-box {
            width: 40px;
            height: 40px;
            border-radius: 6px;
            border: 1px solid white;
        }

        #color1 { background-color: {{c1}}; }
        #color2 { background-color: {{c2}}; }
        #color3 { background-color: {{c3}}; }
        #color4 { background-color: {{c4}}; }
        #color5 { background-color: {{c5}}; }

        .image-container {
            position: relative;
            display: inline-block;
            margin-top: 20px;
        }

        .zoom-window {
            position: absolute;
            top: 0;
            left: 720px;

            width: 300px;
            height: 300px;

            border: 2px solid #333;
            overflow: hidden;

            display: none;

            background-repeat: no-repeat;
            background-size: 2400px auto;
            background-color: white;
        }

        #main-image {
            cursor: crosshair;
        }
    </style>
</head>

<body>

    <h1>Your Uploaded Images</h1>

    <div class="image-container">
        <img
            id="main-image"
            src="{{ collage_image }}"
            width="700"
        >

        <div id="zoom-window" class="zoom-window"></div>
    </div>

    <div class="container">
        <h2 id="palette">Color Palette:</h2>

        <div id="color1" class="color-box"></div>
        <div id="color2" class="color-box"></div>
        <div id="color3" class="color-box"></div>
        <div id="color4" class="color-box"></div>
        <div id="color5" class="color-box"></div>
    </div>

    <a href="{{ url_for('index') }}" id="return">
        Upload more images
    </a>

    <script>
        const img = document.getElementById("main-image");
        const zoomWindow = document.getElementById("zoom-window");

        img.addEventListener("mousemove", function(e) {
            zoomWindow.style.display = "block";

            const rect = img.getBoundingClientRect();

            const x = e.clientX - rect.left;
            const y = e.clientY - rect.top;

            const xPercent = (x / rect.width) * 100;
            const yPercent = (y / rect.height) * 100;

            zoomWindow.style.backgroundImage = `url(${img.src})`;
            zoomWindow.style.backgroundPosition = `${xPercent}% ${yPercent}%`;
        });

        img.addEventListener("mouseleave", function() {
            zoomWindow.style.display = "none";
        });
    </script>

</body>
</html>
