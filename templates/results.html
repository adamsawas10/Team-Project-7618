<!DOCTYPE html>
<html>
<head>
    <title>Results</title>
    <style>
        body {
            margin: 0;
            font-family: Arial, sans-serif;
            background: linear-gradient(135deg, #141e30, #243b55);
            color: white;
            min-height: 100vh;
            display: center;
            justify-content: center;
            align-items: center;
        }

        #return {
            background: #00c6ff;
            border: none;
            padding: 12px 20px;
            border-radius: 999px;
            color: white;
            font-size: 16px;
            cursor: pointer;
        }

        button:hover {
            background: #0072ff;
        }

        .container {
            display: flex;
            gap: 10px; 
            }
        #color1 {
            width: 40px;
            height: 40px;
            background-color: {{c1}};
        }

        #color2 {
            width: 40px;
            height: 40px;
            background-color: {{c2}};
        }

        #color3 {
            width: 40px;
            height: 40px;
            background-color: {{c3}};
        }

        #color4 {
            width: 40px;
            height: 40px;
            background-color: {{c4}};
        }

        #color5 {
            width: 40px;
            height: 40px;
            background-color: {{c5}};
            
        }
    
        #pallete
        {
            margin-bottom: 20px;
        }


    <style>
        .image-container {
            position: relative;
            display: inline-block;
        }

        .zoom-window {
            position: absolute;
            top: 0;
            left: 720px;
            width: 300px;
            height: 300px;
            border: 2px solid #333;
            overflow: hidden;
            display: none;
            background-repeat: no-repeat;
            background-size: 2400px auto; /* Adjust zoom level */
            background-color: white;
        }

        #main-image {
            cursor: crosshair;
        }
    </style>
</head>
<body>
    <h1>Your Uploaded Images</h1>
    <img src="{{ collage_image }}" width="700">
    <br><br>
    <a href="{{ url_for('index') }}" id="return">Upload more images</a>
    <div class="container">
    <h1 id= "pallete">Color pallete: </h1>
    <div id="color1"> </div>
    <div id="color2"> </div>
    <div id="color3"> </div>
    <div id="color4"> </div>
    <div id="color5"> </div>
    </div>

    <div class="image-container">
        <img 
            id="main-image"
            src="{{ collage_image }}"
            width="700"
        >

        <div id="zoom-window" class="zoom-window"></div>
    </div>

    <br><br>
    <a href="{{ url_for('index') }}">Upload more images</a>

    <script>
        const img = document.getElementById("main-image");
        const zoomWindow = document.getElementById("zoom-window");

        img.addEventListener("mousemove", function(e) {
            zoomWindow.style.display = "block";

            const rect = img.getBoundingClientRect();
            const x = e.clientX - rect.left;
            const y = e.clientY - rect.top;
            const xPercent = (x / rect.width) * 100;
            const yPercent = (y / rect.height) * 100;

            zoomWindow.style.backgroundImage = `url(${img.src})`;
            zoomWindow.style.backgroundPosition = `${xPercent}% ${yPercent}%`;
        });

        img.addEventListener("mouseleave", function() {
            zoomWindow.style.display = "none";
        });
    </script>
</body>
</html>
